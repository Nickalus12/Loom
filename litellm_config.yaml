model_list:
  # HEAVY TIER: Gemini 2.5 Flash (primary — swap to Azure when endpoint is ready)
  - model_name: "heavy/*"
    litellm_params:
      model: "gemini/gemini-2.5-flash"
      api_key: "os.environ/GEMINI_API_KEY"
    router_options:
      tpm: 1000000

  # LIGHT TIER: Gemini 2.5 Flash
  - model_name: "light/*"
    litellm_params:
      model: "gemini/gemini-2.5-flash"
      api_key: "os.environ/GEMINI_API_KEY"
    router_options:
      tpm: 1000000

  # EMBEDDING TIER: Gemini Embedding 2 (Multimodal)
  - model_name: "gemini-embedding-2-preview"
    litellm_params:
      model: "gemini/gemini-embedding-2-preview"
      api_key: "os.environ/GEMINI_API_KEY"

  # LOCAL TIER (on-device Gemma 4 E2B via Ollama)
  - model_name: "local/*"
    litellm_params:
      model: "ollama/gemma4-e2b"
      api_base: "http://localhost:11434"

litellm_settings:
  drop_params: true

router_settings:
  routing_strategy: "usage-based-routing"
  enable_fallbacks: true
