model_list:
  # ─────────────────────────────────────────────────────────────
  # HEAVY TIER: Complex reasoning — Azure DeepSeek + Grok-4
  # ─────────────────────────────────────────────────────────────
  - model_name: "heavy/default"
    litellm_params:
      model: "azure/DeepSeek-V3.2-Speciale"
      api_key: "os.environ/AZURE_FOUNDRY_KEY"
      api_base: "https://lumina-ai-resource.cognitiveservices.azure.com"
    model_info:
      id: "heavy-deepseek"
    tpm: 500000
    rpm: 500

  - model_name: "heavy/default"
    litellm_params:
      model: "azure/grok-4-fast-reasoning"
      api_key: "os.environ/AZURE_FOUNDRY_KEY"
      api_base: "https://lumina-ai-resource.cognitiveservices.azure.com"
    model_info:
      id: "heavy-grok4"
    tpm: 500000
    rpm: 500

  - model_name: "heavy/default"
    litellm_params:
      model: "gemini/gemini-2.5-flash"
      api_key: "os.environ/GEMINI_API_KEY"
    model_info:
      id: "heavy-gemini-fallback"
    tpm: 1000000
    rpm: 500

  # ─────────────────────────────────────────────────────────────
  # LIGHT TIER: Utility — Cohere Command A + Gemini + Ollama
  # ─────────────────────────────────────────────────────────────
  - model_name: "light/default"
    litellm_params:
      model: "azure/cohere-command-a"
      api_key: "os.environ/AZURE_FOUNDRY_KEY"
      api_base: "https://lumina-ai-resource.cognitiveservices.azure.com"
    model_info:
      id: "light-cohere"
    tpm: 50000
    rpm: 50

  - model_name: "light/default"
    litellm_params:
      model: "gemini/gemini-2.5-flash"
      api_key: "os.environ/GEMINI_API_KEY"
    model_info:
      id: "light-gemini"
    tpm: 1000000
    rpm: 500

  - model_name: "light/default"
    litellm_params:
      model: "ollama/qwen3:4b"
      api_base: "http://host.docker.internal:11434"
    model_info:
      id: "light-ollama-fallback"
    tpm: 100000
    rpm: 60

  # ─────────────────────────────────────────────────────────────
  # RERANKING: Cohere Rerank v4 via Azure
  # ─────────────────────────────────────────────────────────────
  - model_name: "rerank/default"
    litellm_params:
      model: "azure/Cohere-rerank-v4.0-pro"
      api_key: "os.environ/AZURE_FOUNDRY_KEY"
      api_base: "https://lumina-ai-resource.cognitiveservices.azure.com"
    model_info:
      id: "rerank-cohere"

  # ─────────────────────────────────────────────────────────────
  # LOCAL TIER: On-device inference via Ollama
  # ─────────────────────────────────────────────────────────────
  - model_name: "local/default"
    litellm_params:
      model: "ollama/gemma4-e2b"
      api_base: "http://host.docker.internal:11434"
    tpm: 100000

  - model_name: "local/analysis"
    litellm_params:
      model: "ollama/deepseek-coder-v2:16b"
      api_base: "http://host.docker.internal:11434"
    tpm: 100000

  - model_name: "local/fast"
    litellm_params:
      model: "ollama/qwen3:4b"
      api_base: "http://host.docker.internal:11434"
    tpm: 100000

  # ─────────────────────────────────────────────────────────────
  # EMBEDDING TIER: Graphiti knowledge graph embeddings
  # ─────────────────────────────────────────────────────────────
  - model_name: "gemini-embedding-2-preview"
    litellm_params:
      model: "gemini/gemini-embedding-2-preview"
      api_key: "os.environ/GEMINI_API_KEY"

# ─────────────────────────────────────────────────────────────
# LiteLLM Settings
# ─────────────────────────────────────────────────────────────
litellm_settings:
  drop_params: true
  num_retries: 3
  request_timeout: 30
  fallbacks:
    - {"heavy/default": ["heavy-grok4", "heavy-gemini-fallback"]}
    - {"light/default": ["light-gemini", "light-ollama-fallback"]}
  allowed_fails: 3
  cooldown_time: 30

# ─────────────────────────────────────────────────────────────
# Router Settings
# ─────────────────────────────────────────────────────────────
router_settings:
  routing_strategy: "usage-based-routing"
  num_retries: 2
  timeout: 30
  model_group_alias:
    "heavy/*": "heavy/default"
    "light/*": "light/default"
    "local/*": "local/default"
